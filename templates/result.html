<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recommendation Results | Student Recommendation System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #007bff, #00bcd4);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Result Card */
    .result-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
      padding: 40px;
      max-width: 720px;
      width: 100%;
      text-align: center;
      animation: fadeIn 1s ease;
    }

    .result-card h1 {
      font-weight: 700;
      font-size: 2rem;
      color: #222;
      margin-bottom: 25px;
      background: linear-gradient(90deg, #007bff, #00bcd4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Recommendation Items */
    .list-group-item {
      border: none;
      margin-bottom: 15px;
      padding: 20px;
      border-radius: 15px;
      background: #f8f9fa;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .list-group-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0, 123, 255, 0.25);
      background: #ffffff;
    }

    /* Badge */
    .badge-custom {
      font-size: 0.9rem;
      font-weight: 600;
      background: linear-gradient(90deg, #007bff, #00bcd4);
      color: white;
      padding: 6px 12px;
      border-radius: 12px;
      box-shadow: 0 3px 10px rgba(0, 123, 255, 0.3);
    }

    /* Progress Bar */
    .progress {
      height: 12px;
      border-radius: 10px;
      background: #e9ecef;
      overflow: hidden;
    }

    .progress-bar {
      border-radius: 10px;
      transition: width 1s ease;
    }

    /* Button */
    .btn-custom {
      background: linear-gradient(90deg, #007bff, #00bcd4);
      border: none;
      color: #fff;
      font-weight: 600;
      padding: 12px 30px;
      border-radius: 30px;
      transition: all 0.3s ease;
    }

    .btn-custom:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0, 123, 255, 0.4);
    }

    /* Animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 576px) {
      .result-card {
        padding: 25px;
      }
      .result-card h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>

<body>
  <div class="result-card">
    <h1>🎓 Top Recommended Studies</h1>
    <ul class="list-group">
      {% for recommendation in recommendations %}
        <li class="list-group-item text-start">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <strong>{{ recommendation[0] }}</strong>
            <span class="badge-custom">{{ recommendation[1] }}%</span>
          </div>
          <div class="progress">
            <div class="progress-bar bg-primary" 
                 role="progressbar" 
                 style="width: {{ recommendation[1] }}%" 
                 aria-valuenow="{{ recommendation[1] }}" 
                 aria-valuemin="0" 
                 aria-valuemax="100"></div>
          </div>
        </li>
      {% endfor %}
    </ul>

    <a href="/" class="btn btn-custom mt-4">← Back to Home</a>
  </div>
</body>
</html>
